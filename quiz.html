<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – Fysiologi Gy25</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="site-nav"></div>

<main class="page-wrap">

  <header style="margin-bottom:2rem;">
    <h1 style="font-family:'DM Serif Display',serif; font-size:clamp(1.8rem,5vw,2.6rem); letter-spacing:-0.02em; margin-bottom:0.3rem;">
      Fysiologi <em style="font-style:italic; color:var(--accent);">Quiz</em>
    </h1>
    <p style="color:var(--muted); font-size:0.875rem;">50 frågor · E / C / A-nivå · Välj filter och starta</p>
  </header>

  <!-- FILTER -->
  <div class="quiz-filters" role="group" aria-label="Filtrera frågor">
    <span class="filter-label">Nivå</span>
    <button class="tab-btn filter-level" data-val="all"  aria-pressed="true">Alla</button>
    <button class="tab-btn filter-level" data-val="E"    aria-pressed="false">E</button>
    <button class="tab-btn filter-level" data-val="C"    aria-pressed="false">C</button>
    <button class="tab-btn filter-level" data-val="A"    aria-pressed="false">A</button>

    <div class="filter-sep" aria-hidden="true"></div>

    <span class="filter-label">Kategori</span>
    <button class="tab-btn filter-cat" data-val="all"  aria-pressed="true">Alla</button>
    <button class="tab-btn filter-cat" data-val="mat"  aria-pressed="false">Matspjälkning</button>
    <button class="tab-btn filter-cat" data-val="resp" aria-pressed="false">Respiration</button>
    <button class="tab-btn filter-cat" data-val="cirk" aria-pressed="false">Cirkulation</button>
  </div>

  <!-- STARTSKÄRM -->
  <div class="start-screen" id="start-screen" role="region" aria-label="Starta quiz">
    <h2>Redo att träna?</h2>
    <p>Välj nivå och kategori ovan, sedan kör igång. Varje fråga har fyra svarsalternativ. Du får poäng beroende på nivå: E&nbsp;=&nbsp;1p, C&nbsp;=&nbsp;2p, A&nbsp;=&nbsp;3p.</p>
    <button class="btn btn-lg btn-accent" onclick="startQuiz()" aria-label="Starta quizet">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Starta Quiz
    </button>
  </div>

  <!-- QUIZYTA -->
  <div id="quiz-area" style="display:none;" aria-live="polite">

    <!-- Meta-rad -->
    <div class="quiz-meta">
      <span class="quiz-counter" id="quiz-counter">Fråga <strong>1</strong> av <strong>–</strong></span>
      <span class="quiz-score">Poäng <strong id="quiz-score-disp">0</strong></span>
    </div>

    <!-- Progressbar -->
    <div class="progress-track" style="margin-bottom:1.5rem;" role="progressbar" aria-label="Framsteg" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-fill" id="quiz-progress" style="width:0%"></div>
    </div>

    <!-- Frågekort -->
    <article class="quiz-card" id="quiz-card">
      <div class="quiz-tags" id="quiz-tags"></div>
      <p class="quiz-question" id="quiz-question"></p>
    </article>

    <!-- Svarsalternativ -->
    <div class="quiz-options" id="quiz-options" role="group" aria-label="Svarsalternativ"></div>

    <!-- Feedback -->
    <div class="quiz-feedback" id="quiz-feedback" aria-live="polite" aria-atomic="true"></div>

  </div>

  <!-- RESULTATSIDA -->
  <div class="results-screen" id="results-screen" role="region" aria-label="Resultat">
    <div class="results-icon" id="res-icon">🏆</div>
    <div style="font-size:1.8rem; letter-spacing:0.05em;" id="res-stars">★★★</div>
    <h2 class="results-h">Quiz klart!</h2>
    <p class="results-score" id="res-score">Poäng: <strong>0</strong></p>
    <p style="font-size:0.8rem; color:var(--dim); font-family:'DM Mono',monospace;" id="res-pct">0%</p>
    <div class="results-breakdown" id="res-breakdown"></div>
    <div style="display:flex; gap:10px; margin-top:1rem; flex-wrap:wrap; justify-content:center;">
      <button class="btn btn-accent btn-lg" onclick="startQuiz()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Kör igen
      </button>
      <button class="btn btn-lg" onclick="restartQuiz()">Ändra filter</button>
    </div>
  </div>

</main>

<script src="js/nav.js"></script>
<script src="js/quiz.js"></script>

<script>
/* Sync aria-pressed on filter buttons */
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.filter-level, .filter-cat').forEach(b => {
    b.addEventListener('click', () => {
      const group = b.classList.contains('filter-level') ? '.filter-level' : '.filter-cat';
      document.querySelectorAll(group).forEach(x => x.setAttribute('aria-pressed', 'false'));
      b.setAttribute('aria-pressed', 'true');
    });
  });
});
</script>

</body>
</html>
